name: Deploy Next.js Application

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

      # Récupérer le code
      - name: Checkout
        uses: actions/checkout@v4


      # Installer Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm


      # Installer les dépendances
      - name: Install dependencies
        run: npm ci


      # Vérifier le code
      - name: Run lint
        run: npm run lint


      # Construire Next.js
      - name: Build application
        run: npm run build


      # Connexion au serveur et déploiement
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          # Sans cela, une commande qui échoue laisse le script continuer et le
          # job passe au vert : on redéploierait l'ancien code sans le voir.
          script_stop: true

          script: |
            set -euo pipefail

            cd ${{ secrets.SERVER_PROJECT_PATH }}

            # Le dépôt appartient à un autre utilisateur que celui du déploiement
            # (clone initial fait en sudo). À corriger à la source par un
            # `sudo chown -R <user>:<user> .` sur le serveur ; d'ici là git refuse
            # d'opérer sans cette exception.
            git config --global --add safe.directory "$PWD"

            git fetch origin main
            git reset --hard origin/main
            echo "✅ Git HEAD: $(git log --oneline -1)"

            echo "🛑 Stop everything"
            docker compose down

            echo "🧹 Clean old Docker images and build cache"
            docker image prune -af
            docker builder prune -af

            echo "🔨 Build fresh image (no cache)"
            docker compose build --no-cache

            echo "🚀 Start all services"
            docker compose up -d

            echo "⏳ Wait for DB to be ready"
            sleep 5